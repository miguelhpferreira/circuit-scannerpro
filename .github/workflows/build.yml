name: Criar APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'

      - name: Criar projeto Flutter completo
        run: |
          mkdir temp_app
          cd temp_app
          flutter create .
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/settings.gradle")
          s = p.read_text()
          s = s.replace('id "org.jetbrains.kotlin.android" version "1.7.10" apply false',
                        'id "org.jetbrains.kotlin.android" version "1.9.24" apply false')
          s = s.replace('id "org.jetbrains.kotlin.android" version "1.8.22" apply false',
                        'id "org.jetbrains.kotlin.android" version "1.9.24" apply false')
          p.write_text(s)
          print(p.read_text())
          PY
          cp ../pubspec.yaml pubspec.yaml
          rm -rf lib
          cp -r ../lib lib
          flutter pub get
          flutter build apk --debug

            - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: circuit-scanner-pro-apk
          path: temp_app/build/app/outputs/flutter-apk/*.apk
