name: Criar APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Criar projeto Flutter completo
        run: |
          mkdir temp_app
          cd temp_app
          flutter create .
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/' android/settings.gradle
          cp ../pubspec.yaml pubspec.yaml
          rm -rf lib
          cp -r ../lib lib
          flutter pub get
          flutter build apk --release

      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: circuit-scanner-pro-apk
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
